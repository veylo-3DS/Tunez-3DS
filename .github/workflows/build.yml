name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    container:
      image: devkitpro/devkitarm:latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libmpg123-dev libid3tag0-dev libjpeg-dev libpng-dev qrencode
          dkp-pacman -Syyu --noconfirm devkitARM libctru citro3d citro2d 3ds-libpng 3ds-libjpeg 3ds-libmpg123 3ds-libid3tag

      - name: Build
        run: |
          make cia NO_SMDH=1
          make NO_SMDH=1

      - name: Generate QR Code
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          URL="https://github.com/veylo-3DS/Tunez-3DS/releases/download/${TAG_NAME}/Tunez3DS.cia"
          qrencode -o docs/qr.png "$URL"
          qrencode -o Tunez3DS_qr.png "$URL"

      - name: Commit QR Code
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/qr.png Tunez3DS_qr.png
          git commit -m "chore: update QR code for release ${{ github.ref_name }}" || echo "No changes to commit"
          git push

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --title "Tunez3DS ${{ github.ref_name }}" --notes "Automated release ${{ github.ref_name }}" Tunez3DS.cia Tunez3DS.3dsx
